name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────
  # PS Vita — VPK
  # ───────────────────────────────────────────────
  build-vita:
    name: PS Vita
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install build requirements
        run: apk update && apk add cmake ninja git zstd tar pkgconf

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vita dependencies
        env:
          BASE_URL: https://github.com/dragonflylee/switchfin/releases/download/vita-packages
        run: |
          for pkg in mbedtls-3.6.5-1 curl-8.16.0-2 ffmpeg-n6.0-3 mpv-0.36.0-3; do
            wget "$BASE_URL/${pkg}-arm.tar.xz"
          done
          vdpm libass harfbuzz fribidi freetype libpng libwebp $PWD/*-arm.tar.xz
          git config --system --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_PSV=ON
          cmake --build build

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-vita-${{ github.run_number }}
          path: build/VitaSuwayomi.vpk

  # ───────────────────────────────────────────────
  # Nintendo Switch — NRO
  # ───────────────────────────────────────────────
  build-switch:
    name: Nintendo Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Install build requirements
        run: |
          apt-get update -y
          apt-get install -y cmake ninja-build git pkg-config

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install switchfin portlibs package
        run: |
          curl -fsSL -o /tmp/switch-libmpv.pkg.tar.zst \
            https://github.com/dragonflylee/switchfin/releases/download/switch-portlibs/switch-libmpv-0.41.0-5-any.pkg.tar.zst
          dkp-pacman -U --noconfirm /tmp/switch-libmpv.pkg.tar.zst

      - name: Install Switch dependencies
        run: |
          dkp-pacman -Sy --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-ffmpeg \
            switch-libmpv \
            switch-libass \
            switch-freetype \
            switch-harfbuzz \
            switch-libpng \
            switch-libwebp

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DPLATFORM_SWITCH=ON
          cmake --build build

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-switch-${{ github.run_number }}
          path: build/VitaSuwayomi.nro

  # ───────────────────────────────────────────────
  # Desktop — Linux x86_64
  # ───────────────────────────────────────────────
  build-desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Install build requirements
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build git pkg-config \
            libcurl4-openssl-dev \
            libmbedtls-dev \
            libmpv-dev \
            libass-dev \
            libfreetype-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libwebp-dev \
            libzstd-dev \
            libglfw3-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON
          cmake --build build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-linux-${{ github.run_number }}
          path: |
            build/VitaSuwayomi
            build/resources/

  # ───────────────────────────────────────────────
  # Desktop — macOS (arm64 + x86_64)
  # ───────────────────────────────────────────────
  build-desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-14   # arm64 runner; change to macos-13 for x86_64

    steps:
      - name: Install build requirements
        run: |
          brew install cmake ninja pkg-config \
            curl mbedtls mpv libass freetype harfbuzz \
            fribidi libpng webp zstd glfw

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON
          cmake --build build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-macos-${{ github.run_number }}
          path: |
            build/VitaSuwayomi
            build/resources/

  # ───────────────────────────────────────────────
  # Desktop — Windows (MinGW cross-compile)
  # ───────────────────────────────────────────────
  build-desktop-windows:
    name: Desktop (Windows)
    runs-on: ubuntu-22.04

    steps:
      - name: Install MinGW and build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build git pkg-config \
            mingw-w64

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Windows deps via vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'f7423ee180c4b7f40d43402c2feb3859161ef625'

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-static \
            -DPLATFORM_DESKTOP=ON
          cmake --build build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-windows-${{ github.run_number }}
          path: |
            build/VitaSuwayomi.exe
            build/resources/
