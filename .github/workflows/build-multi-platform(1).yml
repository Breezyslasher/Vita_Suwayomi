name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: which platform to build
        type: choice
        options:
        - mingw64
        - macos
        - nx
        - psvita
        - ps4
        - flatpak
        - android
        - aur
        - deb
      disable_builtin_nsp:
        description: disable builtin NSP
        type: boolean

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  upload-release:
    needs: [ build-mingw, build-nx, build-macos, build-flatpak, build-aur, build-ps4, build-vita, build-android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Assets
        uses: actions/download-artifact@v4
      - name: Package Windows assets
        run: |
          for p in VitaSuwayomi-windows-*; do
            [[ -d $p ]] && 7z a -mx=9 $p.7z ./$p/* && rm -rf $p
          done
      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: VitaSuwayomi ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            VitaSuwayomi-windows-*.7z
            VitaSuwayomi-macos-*/*
            VitaSuwayomi-nx-*/*.nro
            VitaSuwayomi-ps4-*/*
            VitaSuwayomi-vita-*/*.vpk
            VitaSuwayomi-Flatpak-*/*
            VitaSuwayomi-aur-*/*.pkg.tar.*
            VitaSuwayomi-android-*/*

  # ───────────────────────────────────────────────
  # PS Vita — VPK
  # ───────────────────────────────────────────────
  build-vita:
    if: ${{ inputs.platform == 'psvita' || github.event_name != 'workflow_dispatch' }}
    name: PS Vita
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install build requirements
        run: apk update && apk add cmake ninja git zstd tar pkgconf

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vita dependencies
        env:
          BASE_URL: https://github.com/dragonflylee/switchfin/releases/download/vita-packages
        run: |
          for pkg in mbedtls-3.6.5-1 curl-8.16.0-2 ffmpeg-n6.0-3 mpv-0.36.0-3; do
            wget "$BASE_URL/${pkg}-arm.tar.xz"
          done
          vdpm libass harfbuzz fribidi freetype libpng libwebp $PWD/*-arm.tar.xz
          git config --system --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_PSV=ON
          cmake --build build

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-vita-${{ github.run_number }}
          path: build/VitaSuwayomi.vpk

  # ───────────────────────────────────────────────
  # Android — arm64-v8a
  # ───────────────────────────────────────────────
  build-android:
    name: Android (arm64-v8a)
    runs-on: ubuntu-22.04
    if: ${{ inputs.platform == 'android' || github.event_name != 'workflow_dispatch' }}

    steps:
      - name: Install build requirements
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build git pkg-config             autoconf automake libtool nasm make meson

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          link-to-sdk: true

      - name: Cache Android native deps
        id: cache-android-native-deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-deps
          key: android-native-deps-arm64-v8a-api24-v3

      - name: Build Android native dependencies
        if: steps.cache-android-native-deps.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -e
          NDK=$ANDROID_NDK_HOME
          TC=$NDK/build/cmake/android.toolchain.cmake
          PREFIX=${{ github.workspace }}/android-deps
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android24
          export AR=$TOOLCHAIN/bin/llvm-ar
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export CXX=$TOOLCHAIN/bin/$TARGET-clang++
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
          mkdir -p "$PREFIX"
          NCPU=$(nproc)

          CMAKE_COMMON=(
            -G Ninja
            -DCMAKE_TOOLCHAIN_FILE="$TC"
            -DANDROID_ABI=arm64-v8a
            -DANDROID_PLATFORM=android-24
            -DCMAKE_INSTALL_PREFIX="$PREFIX"
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_PREFIX_PATH="$PREFIX"
            -DCMAKE_FIND_ROOT_PATH="$PREFIX"
          )

          # ── zlib ──────────────────────────────────────────────────────
          curl -sL https://zlib.net/zlib-1.3.1.tar.gz | tar -xz
          cmake -S zlib-1.3.1 -B build-zlib "${CMAKE_COMMON[@]}"
          cmake --build build-zlib -j$NCPU && cmake --install build-zlib

          # ── libpng ────────────────────────────────────────────────────
          curl -sL https://download.sourceforge.net/libpng/libpng-1.6.43.tar.gz | tar -xz
          cmake -S libpng-1.6.43 -B build-png "${CMAKE_COMMON[@]}" \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF
          cmake --build build-png -j$NCPU && cmake --install build-png

          # ── libwebp ───────────────────────────────────────────────────
          curl -sL https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.4.0.tar.gz | tar -xz
          cmake -S libwebp-1.4.0 -B build-webp "${CMAKE_COMMON[@]}" \
            -DWEBP_BUILD_ANIM_UTILS=OFF \
            -DWEBP_BUILD_CWEBP=OFF \
            -DWEBP_BUILD_DWEBP=OFF \
            -DWEBP_BUILD_GIF2WEBP=OFF \
            -DWEBP_BUILD_IMG2WEBP=OFF \
            -DWEBP_BUILD_VWEBP=OFF \
            -DWEBP_BUILD_WEBPINFO=OFF \
            -DWEBP_BUILD_WEBPMUX=OFF \
            -DWEBP_BUILD_EXTRAS=OFF
          cmake --build build-webp -j$NCPU && cmake --install build-webp

          # ── mbedtls ───────────────────────────────────────────────────
          curl -sL https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-3.6.3/mbedtls-3.6.3.tar.bz2 | tar -xj
          cmake -S mbedtls-3.6.3 -B build-mbedtls "${CMAKE_COMMON[@]}" \
            -DENABLE_TESTING=OFF \
            -DENABLE_PROGRAMS=OFF
          cmake --build build-mbedtls -j$NCPU && cmake --install build-mbedtls

          # ── curl ──────────────────────────────────────────────────────
          curl -sL https://curl.se/download/curl-8.11.1.tar.gz | tar -xz
          cmake -S curl-8.11.1 -B build-curl "${CMAKE_COMMON[@]}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCURL_USE_MBEDTLS=ON \
            -DCURL_USE_OPENSSL=OFF \
            -DCURL_DISABLE_LDAP=ON
          cmake --build build-curl -j$NCPU && cmake --install build-curl

          # ── freetype ──────────────────────────────────────────────────
          curl -sL https://download.savannah.gnu.org/releases/freetype/freetype-2.13.3.tar.gz | tar -xz
          cmake -S freetype-2.13.3 -B build-freetype "${CMAKE_COMMON[@]}" \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON
          cmake --build build-freetype -j$NCPU && cmake --install build-freetype

          # ── fribidi (autotools — no CMakeLists.txt) ───────────────────
          curl -sL https://github.com/fribidi/fribidi/releases/download/v1.0.16/fribidi-1.0.16.tar.xz | tar -xJ
          (
            cd fribidi-1.0.16
            CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            ./configure \
              --host=aarch64-linux-android \
              --prefix="$PREFIX" \
              --enable-static \
              --disable-shared \
              --disable-docs
            make -j$NCPU
            make install
          )

          # ── harfbuzz (depends on freetype) ────────────────────────────
          curl -sL https://github.com/harfbuzz/harfbuzz/archive/refs/tags/10.2.0.tar.gz | tar -xz
          cmake -S harfbuzz-10.2.0 -B build-harfbuzz "${CMAKE_COMMON[@]}" \
            -DHB_BUILD_TESTS=OFF \
            -DHB_BUILD_UTILS=OFF \
            -DHB_BUILD_SUBSET=OFF \
            -DHB_HAVE_FREETYPE=ON
          cmake --build build-harfbuzz -j$NCPU && cmake --install build-harfbuzz

          # ── libass (depends on freetype, fribidi, harfbuzz) ───────────
          curl -sL https://github.com/libass/libass/releases/download/0.17.3/libass-0.17.3.tar.gz | tar -xz
          (
            cd libass-0.17.3
            CC="$CC" CXX="$CXX" AR="$AR" RANLIB="$RANLIB" \
            PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
            CFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            ./configure \
              --host=aarch64-linux-android \
              --prefix="$PREFIX" \
              --enable-static \
              --disable-shared \
              --disable-fontconfig \
              --disable-coretext
            make -j$NCPU
            make install
          )

          # ── zstd ──────────────────────────────────────────────────────
          curl -fsSL --retry 3 --retry-delay 5 \
           "https://downloads.sourceforge.net/project/libzstd/libzstd/v1.5.6/zstd-1.5.6.tar.gz" \
           -o zstd.tar.gz
          file zstd.tar.gz && tar -xzf zstd.tar.gz
          cmake -S zstd-1.5.6/build/cmake -B build-zstd "${CMAKE_COMMON[@]}" \
            -DZSTD_BUILD_PROGRAMS=OFF \
            -DZSTD_BUILD_TESTS=OFF \
            -DZSTD_BUILD_SHARED=OFF
          cmake --build build-zstd -j$NCPU && cmake --install build-zstd

      - name: Build libromfs-generator (host)
        run: |
          if [ -d lib/borealis/library/lib/extern/libromfs/generator ]; then
            GEN_SRC="lib/borealis/library/lib/extern/libromfs/generator"
          elif [ -d library/borealis/library/lib/extern/libromfs/generator ]; then
            GEN_SRC="library/borealis/library/lib/extern/libromfs/generator"
          else
            echo "Could not find libromfs generator source directory"
            exit 1
          fi
          cmake -S "$GEN_SRC" -B /tmp/libromfs-generator -G Ninja
          cmake --build /tmp/libromfs-generator
          GEN_BIN="/tmp/libromfs-generator/libromfs-generator"
          sudo install -m 0755 "$GEN_BIN" /usr/local/bin/libromfs-generator
          # borealis toolchain.cmake checks ${CMAKE_SOURCE_DIR}/libromfs-generator
          install -m 0755 "$GEN_BIN" ./libromfs-generator
          [ -d lib/borealis ] && install -m 0755 "$GEN_BIN" lib/borealis/libromfs-generator || true
          [ -d library/borealis ] && install -m 0755 "$GEN_BIN" library/borealis/libromfs-generator || true

      - name: Bump Android version (switchfin-style)
        if: ${{ hashFiles('app/platform/android/app/build.gradle') != '' }}
        uses: chkfung/android-version-actions@v1.2.2
        with:
          gradlePath: app/platform/android/app/build.gradle
          versionCode: ${{ github.run_number }}

      - name: Build Android APK (switchfin-style)
        if: ${{ hashFiles('app/platform/android/gradlew') != '' }}
        run: |
          cd app/platform/android && ./gradlew assembleRelease

      - name: Build Android shared library (fallback CMake)
        if: ${{ hashFiles('app/platform/android/gradlew') == '' }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          DEPS=${{ github.workspace }}/android-deps
          cmake -B build-android -G Ninja \
            -DPLATFORM_ANDROID=ON \
            -DLIBROMFS_PROJECT_NAME=VitaSuwayomi \
            -DLIBROMFS_RESOURCE_LOCATION=${{ github.workspace }}/resources \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_PREFIX_PATH="$DEPS" \
            -DCMAKE_FIND_ROOT_PATH="$DEPS" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_C_FLAGS="-I$DEPS/include" \
            -DCMAKE_CXX_FLAGS="-I$DEPS/include" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L$DEPS/lib" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$DEPS/lib"
          cmake --build build-android

      - name: Upload Android APK
        if: ${{ hashFiles('app/platform/android/gradlew') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-android-apk-${{ github.run_number }}
          path: app/platform/android/app/build/outputs/apk/release/*.apk

      - name: Upload Android shared library
        if: ${{ hashFiles('app/platform/android/gradlew') == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-android-${{ github.run_number }}
          path: build-android/libVitaSuwayomi.so

  # ───────────────────────────────────────────────
  # Desktop — Windows Matrix via MSYS2 (x64/x86/arm64)
  # ───────────────────────────────────────────────
  build-desktop-windows-matrix:
    name: Desktop (Windows ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: x64, sys: mingw64, env: x86_64, runner: windows-latest }
        - { arch: x86, sys: mingw32, env: i686, runner: windows-latest }
        - { arch: arm64, sys: clangarm64, env: clang-aarch64, runner: windows-11-arm }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          path-type: inherit
          cache: false
          release: ${{ contains(matrix.sys, 'arm64') }}
          install: >-
            mingw-w64-${{ matrix.env }}-ninja
            mingw-w64-${{ matrix.env }}-cc
            mingw-w64-${{ matrix.env }}-cmake
            mingw-w64-${{ matrix.env }}-glfw
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependency
        run: |
          for pkg in glfw-3.5.0-1 curl-8.16.0-1 mpv-0.41.0-1 libwebp-1.6.0-1; do
            curl -sLO https://github.com/dragonflylee/switchfin/releases/download/mingw-packages/${MINGW_PACKAGE_PREFIX}-${pkg}-any.pkg.tar.zst
          done
          pacman -U --noconfirm *.pkg.tar.zst
      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DPLATFORM_DESKTOP=ON \
            -DWIN32_TERMINAL=OFF \
            -DZLIB_USE_STATIC_LIBS=ON \
            -DUSE_SYSTEM_GLFW=ON
          cmake --build build
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-windows-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            build/VitaSuwayomi.exe
            build/resources/

  # ───────────────────────────────────────────────
  # Flatpak — Linux Matrix (x86_64 + aarch64, OpenGL)
  # ───────────────────────────────────────────────
  build-flatpak:
    if: ${{ inputs.platform == 'flatpak' || github.event_name != 'workflow_dispatch' }}
    name: Flatpak (${{ matrix.arch }}-${{ matrix.driver }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: x86_64, runner: ubuntu-24.04, driver: gl, gles2: "OFF" }
        - { arch: aarch64, runner: ubuntu-24.04-arm, driver: gl, gles2: "OFF" }
        - { arch: aarch64, runner: ubuntu-24.04-arm, driver: gles2, gles2: "ON" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set workspace permissions
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Install dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              cmake ninja-build pkg-config \
              libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
              libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
              libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
              libpng-dev libwebp-dev libzstd-dev libdbus-1-dev \
              libwayland-dev libxkbcommon-dev xorg-dev
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y \
              cmake ninja-build pkgconf-pkg-config \
              libcurl-devel mbedtls-devel mpv-devel \
              ffmpeg-devel lame-devel libass-devel freetype-devel harfbuzz-devel fribidi-devel \
              libpng-devel libwebp-devel libzstd-devel dbus-devel \
              wayland-devel libxkbcommon-devel libX11-devel libXrandr-devel libXi-devel libXinerama-devel libXcursor-devel
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y \
              cmake ninja-build pkgconf-pkg-config \
              libcurl-devel mbedtls-devel mpv-devel \
              ffmpeg-devel lame-devel libass-devel freetype-devel harfbuzz-devel fribidi-devel \
              libpng-devel libwebp-devel libzstd-devel dbus-devel \
              wayland-devel libxkbcommon-devel libX11-devel libXrandr-devel libXi-devel libXinerama-devel libXcursor-devel
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache \
              cmake ninja pkgconf \
              curl-dev mbedtls-dev mpv-dev ffmpeg-dev lame-dev libass-dev freetype-dev harfbuzz-dev fribidi-dev \
              libpng-dev libwebp-dev zstd-dev dbus-dev wayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev
          else
            echo "No supported package manager found; assuming container image already has required build dependencies"
          fi
      - name: Build desktop target in flatpak container
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON -DUSE_GLES2=${{ matrix.gles2 }}
          cmake --build build
          tar -czf VitaSuwayomi-Linux-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}.tar.gz -C build VitaSuwayomi resources
      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-Flatpak-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}
          path: VitaSuwayomi-Linux-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}.tar.gz

  # ───────────────────────────────────────────────
  # Nintendo Switch — Matrix (opengl + deko3d)
  # ───────────────────────────────────────────────
  build-nx:
    if: ${{ inputs.platform == 'nx' || github.event_name != 'workflow_dispatch' }}
    name: NX (${{ matrix.driver }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - { driver: opengl, mpv_pkg: switch-libmpv-0.41.0-5-any.pkg.tar.zst, cmake_extra: "" }
        - { driver: deko3d, mpv_pkg: switch-libmpv-deko3d-0.41.0-5-any.pkg.tar.zst, cmake_extra: "-DUSE_DEKO3D=ON" }
    container:
      image: devkitpro/devkita64:20260219
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install switchfin portlibs
        run: |
          BASE_URL="https://github.com/dragonflylee/switchfin/releases/download/switch-portlibs"
          dkp-pacman --noconfirm -Rdd switch-libmpv || true
          dkp-pacman --noconfirm -Rdd switch-libmpv-deko3d || true
          dkp-pacman --noconfirm -U \
            $BASE_URL/hacBrewPack-3.05-1-x86_64.pkg.tar.zst \
            $BASE_URL/libuam-master-1-any.pkg.tar.zst \
            $BASE_URL/switch-dav1d-1.5.3-1-any.pkg.tar.zst \
            $BASE_URL/${{ matrix.mpv_pkg }}
      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DPLATFORM_SWITCH=ON \
            ${{ matrix.cmake_extra }}
          cmake --build build
      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-nx-${{ matrix.driver }}-${{ github.run_number }}
          path: build/VitaSuwayomi.nro

  # ───────────────────────────────────────────────
  # PS4
  # ───────────────────────────────────────────────
  build-ps4:
    if: ${{ inputs.platform == 'ps4' || github.event_name != 'workflow_dispatch' }}
    name: PS4
    runs-on: ubuntu-latest
    container:
      image: xfangfang/pacbrew:250221
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        env:
          OPENORBIS: /opt/pacbrew/ps4/openorbis
        run: |
          cmake -B build -DPLATFORM_PS4=ON
          cmake --build build
      - name: Upload PS4 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-ps4-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            build/**/*.pkg
            build/**/*.oelf

  # ───────────────────────────────────────────────
  # macOS matrix (explicit job name parity)
  # ───────────────────────────────────────────────
  build-macos:
    if: ${{ inputs.platform == 'macos' || github.event_name != 'workflow_dispatch' }}
    name: macOS (${{ matrix.tag }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { tag: Silicon, arch: arm64, target: "11.0", runner: macos-14 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: brew install cmake ninja pkg-config curl mbedtls mpv libass freetype harfbuzz fribidi libpng webp zstd glfw
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.target }}
          cmake --build build
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-macos-${{ matrix.tag }}-${{ github.run_number }}
          path: |
            build/VitaSuwayomi
            build/resources/

  # ───────────────────────────────────────────────
  # MinGW matrix (x64/x86/arm64)
  # ───────────────────────────────────────────────
  build-mingw:
    if: ${{ inputs.platform == 'mingw64' || github.event_name != 'workflow_dispatch' }}
    name: MinGW (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: x64, sys: mingw64, env: x86_64, runner: windows-latest }
        - { arch: x86, sys: mingw32, env: i686, runner: windows-latest }
        - { arch: arm64, sys: clangarm64, env: clang-aarch64, runner: windows-11-arm }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          path-type: inherit
          cache: false
          release: ${{ contains(matrix.sys, 'arm64') }}
          install: >-
            mingw-w64-${{ matrix.env }}-ninja
            mingw-w64-${{ matrix.env }}-cc
            mingw-w64-${{ matrix.env }}-cmake
            mingw-w64-${{ matrix.env }}-glfw
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependency
        run: |
          for pkg in glfw-3.5.0-1 curl-8.16.0-1 mpv-0.41.0-1 libwebp-1.6.0-1; do
            curl -sLO https://github.com/dragonflylee/switchfin/releases/download/mingw-packages/${MINGW_PACKAGE_PREFIX}-${pkg}-any.pkg.tar.zst
          done
          pacman -U --noconfirm *.pkg.tar.zst
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON -DUSE_SYSTEM_GLFW=ON
          cmake --build build
      - name: Upload mingw artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-mingw-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            build/VitaSuwayomi.exe
            build/resources/

  # ───────────────────────────────────────────────
  # Debian package-like build
  # ───────────────────────────────────────────────
  build-deb:
    if: ${{ inputs.platform == 'deb' || github.event_name != 'workflow_dispatch' }}
    name: Deb build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential git pkg-config zstd \
            libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
            libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
            libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libwebp-dev libdbus-1-dev \
            wayland-protocols libwayland-bin libwayland-dev libxkbcommon-dev xorg-dev
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON
          cmake --build build
          PKGROOT="pkgroot"
          rm -rf "$PKGROOT"
          mkdir -p "$PKGROOT/DEBIAN" "$PKGROOT/usr/bin" "$PKGROOT/usr/lib/VitaSuwayomi" "$PKGROOT/usr/share/VitaSuwayomi" "$PKGROOT/usr/share/applications" "$PKGROOT/usr/share/pixmaps"
          install -m 755 build/VitaSuwayomi "$PKGROOT/usr/lib/VitaSuwayomi/VitaSuwayomi"
          {
            echo '#!/usr/bin/env sh'
            echo 'cd /usr/share/VitaSuwayomi || exit 1'
            echo 'exec /usr/lib/VitaSuwayomi/VitaSuwayomi "$@"'
          } > "$PKGROOT/usr/bin/VitaSuwayomi"
          chmod 755 "$PKGROOT/usr/bin/VitaSuwayomi"
          cp -r build/resources "$PKGROOT/usr/share/VitaSuwayomi/resources"
          install -m 644 sce_sys/icon0.png "$PKGROOT/usr/share/pixmaps/vitasuwayomi.png"
          {
            echo '[Desktop Entry]'
            echo 'Type=Application'
            echo 'Name=VitaSuwayomi'
            echo 'Comment=Suwayomi desktop client'
            echo 'Exec=VitaSuwayomi'
            echo 'Icon=vitasuwayomi'
            echo 'Terminal=false'
            echo 'Categories=Network;Utility;'
          } > "$PKGROOT/usr/share/applications/vitasuwayomi.desktop"
          ARCH="$(dpkg --print-architecture)"
          {
            echo "Package: vitasuwayomi"
            echo "Version: 0.1.${{ github.run_number }}"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Architecture: ${ARCH}"
            echo "Maintainer: VitaSuwayomi CI <ci@vitasuwayomi.local>"
            echo "Description: VitaSuwayomi desktop build artifact"
          } > "$PKGROOT/DEBIAN/control"
          dpkg-deb --build "$PKGROOT" "VitaSuwayomi-${{ github.run_number }}_${ARCH}.deb"
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-deb-${{ github.run_number }}
          path: VitaSuwayomi-${{ github.run_number }}_*.deb

  # ───────────────────────────────────────────────
  # AUR-like build
  # ───────────────────────────────────────────────
  build-aur:
    if: ${{ inputs.platform == 'aur' || github.event_name != 'workflow_dispatch' }}
    name: AUR build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential git pkg-config zstd \
            libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
            libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
            libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libwebp-dev libdbus-1-dev \
            wayland-protocols libwayland-bin libwayland-dev libxkbcommon-dev xorg-dev
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON
          cmake --build build
          tar --zstd -cf VitaSuwayomi-${{ github.run_number }}.pkg.tar.zst -C build VitaSuwayomi resources
      - name: Upload aur artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaSuwayomi-aur-${{ github.run_number }}
          path: VitaSuwayomi-${{ github.run_number }}.pkg.tar.zst
